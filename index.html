<!DOCTYPE html>
<html lang="en">
<head>
    <title>My To Do List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
    background-color: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Orbitron', sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    color: #00f0ff;
    text-transform: uppercase;
    letter-spacing: 4px;
    border-bottom: 1px solid #00f0ff;
    padding-bottom: 10px;
}

input[type="text"] {
    background-color: #1a1a1a;
    border: 1px solid #00f0ff;
    color: white;
    padding: 8px 12px;
    font-family: 'Orbitron', sans-serif;
    width: 70%;
}

button {
    background-color: #00f0ff;
    color: #0d0d0d;
    border: none;
    padding: 8px 16px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    padding: 10px;
    border-left: 3px solid #00f0ff;
    margin-bottom: 8px;
    background-color: #1a1a1a;
}
li label {
    display: block;
    width: 100%;
    cursor: pointer;
}
    </style>
</head>


<script>
    function addTask() {
        const input = document.getElementById("task-input");
        const taskText = input.value;

        if (taskText === "") {
            return;
        }

        const li = document.createElement("li");
        li.innerHTML = `<input type="checkbox"> ${taskText}`;

        document.getElementById("task-list").appendChild(li);
        input.value = "";
    }

    function toggleTask(checkbox) {
    const li = checkbox.parentElement;
    if (checkbox.checked) {
        li.style.opacity = "0.4";
        li.style.textDecoration = "line-through";
    } else {
        li.style.opacity = "1";
        li.style.textDecoration = "none";
    }
}
</script>
<body>
    <input type="text" id="task-input" placeholder="New task...">
    <button onclick="addTask()">+ Add Task</button>
    <h1>Today's Tasks</h1>
    
    <ul id="task-list">
        <li><label for="t1"><input type="checkbox" id="t1" onchange="toggleTask(this)"> Wake up at 5Am</label></li>
        <li><label for="t2"><input type="checkbox" id="t2" onchange="toggleTask(this)"> Go to the gym</label></li>
        <li><label for="t3"><input type="checkbox" id="t3" onchange="toggleTask(this)"> Read some book</label></li>
        <li><label for="t4"><input type="checkbox" id="t4" onchange="toggleTask(this)"> Study Boot.dev</label></li>
    </ul>
</body>
</html>
