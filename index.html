<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cyber To‑Do — Netrunner Edition</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- OVERLAY para detectar clicks fuera -->
  <div id="overlay" class="hidden" aria-hidden="true"></div>

  <!-- TOPBAR con menu en la esquina superior derecha -->
  <header id="topbar">
    <div class="brand">⚡ Cyber To‑Do</div>
    <div id="menu-wrap">
      <button id="menu-button" aria-label="menu">☰</button>
      <nav id="floating-menu" class="hidden" aria-hidden="true">
        <div class="menu-item" id="menu-history">History</div>
        <div class="menu-item" id="menu-settings">Settings</div>
        <div class="menu-item" id="menu-themes">Themes</div>
      </nav>
    </div>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <main id="main">
    <!-- PANEL IZQUIERDO: INPUT + LISTA DE TAREAS -->
    <section id="left-column">
      <div id="task-input-box">
        <input type="text" id="task-input" placeholder="New task..." aria-label="New task" />
        <button id="add-btn" aria-label="Add task">+ Add Task</button>
      </div>

      <h1 class="title">Today's Tasks</h1>

      <ul id="task-list" aria-live="polite"></ul>
    </section>

    <!-- PANEL DERECHO: TERMINAL / INFO (oculto por defecto) -->
    <aside id="right-column">
      <div id="side-info" aria-hidden="true">
        <div class="log-line">&gt; ACCESSING LOGS...</div>
        <div class="log-line">&gt; CONNECTING TO ARCHIVE NODE 07...</div>
        <div class="log-line">&gt; DECRYPTING...</div>
      </div>
    </aside>
  </main>

  <!-- FOOTER: SCORE + TIMER -->
  <footer id="footer">
    <div id="score-box">Score: <span id="score">0</span></div>
    <div id="reset-timer" title="Time until daily reset">Reset in: --</div>
  </footer>

  <!-- TERMINAL HOLOGRÁFICA (slide-in desde la derecha) -->
  <div id="history-terminal" class="hidden" role="dialog" aria-hidden="true">
    <div class="terminal-header">HISTORY</div>
    <div id="terminal-content"></div>
    <button id="close-terminal" aria-label="Close history">Close</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
