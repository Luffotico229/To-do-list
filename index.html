<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cyberpunk To‑Do — Netrunner Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- PANEL IZQUIERDO: INPUT + MENÚ -->
    <div id="left-panel">

        <div id="task-input-box">
            <input type="text" id="task-input" placeholder="New task...">
            <button id="add-btn" onclick="addTask()">ADD</button>
        </div>

        <!-- MENÚ FLOTANTE -->
        <button id="menu-button">◎</button>

        <div id="floating-menu">
            <div class="menu-item" onclick="openHistory()">History</div>
            <div class="menu-item" onclick="openSettings()">Settings</div>
            <div class="menu-item" onclick="openThemes()">Themes</div>
        </div>

    </div>

    <!-- PANEL DERECHO: LISTA DE TAREAS -->
    <div id="task-panel">
        <h1 class="neon">Today's Tasks</h1>
        <ul id="task-list"></ul>
    </div>

    <!-- FOOTER: SCORE + TIMER -->
    <div id="footer">
        <div id="score-box">Score: <span id="score">0</span></div>
        <div id="reset-timer">Reset in: --</div>
    </div>

    <!-- TERMINAL HOLOGRÁFICA -->
    <div id="history-terminal"></div>

    <script src="score.js"></script>
    <script src="timer.js"></script>
    <script src="history.js"></script>
    <script src="main.js"></script>

</body>
</html>
