<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cyberpunk To‑Do</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <input type="text" id="task-input" placeholder="New task...">
    <button onclick="addTask()">+ Add Task</button>

    <h1 class="neon">Today's Tasks</h1>

    <ul id="task-list"></ul>

    <div id="score-box">Score: <span id="score">0</span></div>
    <div id="reset-timer">Reset in: --</div>

    <!-- MENÚ FLOTANTE -->
    <button id="menu-button">◎</button>

    <div id="floating-menu">
        <div class="menu-item" onclick="openHistory()">Historial</div>
        <div class="menu-item">Configuración</div>
        <div class="menu-item">Tema</div>
    </div>

    <!-- TERMINAL HOLOGRÁFICA -->
    <div id="history-terminal"></div>

    <script src="score.js"></script>
    <script src="timer.js"></script>
    <script src="history.js"></script>
    <script src="main.js"></script>

</body>
</html>
